<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>i18n Manager</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <header class="brand">
        <h1>i18n Manager</h1>
        <p>Edit source JSON and generate minified files.</p>
      </header>

      <section class="panel">
        <div class="panel-title">
          <span>Languages</span>
          <button class="icon-button" id="refreshButton" title="Refresh" type="button">R</button>
        </div>
        <div class="list" id="languageList"></div>
        <form class="inline-form" id="languageForm">
          <input id="languageInput" placeholder="new language" aria-label="New language code">
          <button type="submit" title="Add language">+</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-title">
          <span>Data files</span>
          <strong id="dataCount">0 JSON</strong>
        </div>
        <div class="list" id="dataList"></div>
      </section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <h2 id="fileTitle">Select a file</h2>
          <p id="filePath">js/i18n or js/data</p>
        </div>
        <div class="actions">
          <button id="rawButton" type="button">Raw JSON</button>
          <button id="validateButton" type="button">Validate</button>
          <button id="minifyButton" type="button">Minify current</button>
          <button id="minifyAllButton" type="button">Minify all</button>
          <button class="primary" id="saveButton" type="button" disabled>Save</button>
        </div>
      </header>

      <section class="editor">
        <div class="editor-header">
          <nav class="breadcrumbs" id="breadcrumbs"></nav>
          <div class="meta" id="nodeMeta"></div>
          <button id="addFieldButton" type="button">Add field</button>
        </div>
        <div class="fields" id="fieldList"></div>
      </section>
    </main>

    <dialog id="rawDialog">
      <form method="dialog" class="dialog">
        <header>
          <h3>Raw JSON</h3>
          <button value="cancel" type="submit">Close</button>
        </header>
        <textarea id="rawEditor" spellcheck="false"></textarea>
        <footer>
          <button id="formatRawButton" type="button">Format</button>
          <button id="applyRawButton" class="primary" value="default" type="submit">Apply</button>
        </footer>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
