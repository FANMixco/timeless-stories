    <meta property="og:title" content="Timeless Stories - Memory Game" />

    <meta property="twitter:card" content="summary_large_image" />

    <link rel="canonical" href="https://tstories.federiconavarrete.com/memory-game.html" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicons/favicon-16x16.png" />
    <link rel="manifest" href="site.webmanifest" />
    <script type="application/ld+json" id="memoryGameSchema">
      {
        "@context": "https://schema.org",
        "@type": "Game",
        "name": "Timeless Stories - Memory Game",
        "description": "Match Salvadoran legends with their Spanish mirror legends in this multilingual memory game.",
        "url": "https://tstories.federiconavarrete.com/memory-game.html",
        "image": "https://tstories.federiconavarrete.com/img/preview_memory.jpg",
        "inLanguage": ["en", "es", "fr", "zh"],
        "isAccessibleForFree": true,
        "genre": "Memory game",
        "gamePlatform": "Web browser",
        "about": [
          "Salvadoran folklore",
          "Spanish folklore",
          "Spanish Mirrors",
          "Timeless Stories"
        ],
        "isPartOf": {
          "@type": "WebSite",
          "name": "Timeless Stories",
          "url": "https://tstories.federiconavarrete.com"
        },
        "publisher": {
          "@type": "Person",
          "name": "Federico Navarrete"
        }
      }
    </script>
    <link rel="stylesheet" href="css/icon-moon-memory.min.css" />
    <link rel="stylesheet" href="css/memory-game.min.css?v=20260523-flip-delay" />
  </head>
  <body>
    <main class="game-shell" aria-label="">
      <section class="game-top">
        <div>
          <h1 class="game-title standalone-only" id="gameTitle"></h1>
          <p class="game-subtitle"></p>
        </div>
        <div class="game-actions">
          <button class="game-button" type="button" id="newGameButton"></button>
          <button class="game-button secondary" type="button" id="hintButton"></button>
          <button class="game-button secondary" type="button" id="shareButton"></button>
        </div>
      </section>

      <section class="status-grid" aria-label="">
        <div class="status-item">
          <span class="status-label" data-ui-label="moves"></span>
          <span class="status-value" id="movesValue">0</span>
        </div>
        <div class="status-item">
          <span class="status-label" data-ui-label="matches"></span>
          <span class="status-value" id="matchesValue">0/0</span>
        </div>
        <div class="status-item">
          <span class="status-label" data-ui-label="time"></span>
          <span class="status-value" id="timeValue">0:00</span>
        </div>
      </section>

      <section class="match-insight" id="matchInsight" aria-live="polite">
        <h2 id="matchInsightTitle"></h2>
        <p id="matchInsightText"></p>
      </section>

      <section class="board" id="board" aria-label=""></section>
      <aside class="legend-toast" id="legendToast" aria-live="polite" hidden>
        <div>
          <strong id="legendToastTitle"></strong>
          <p id="legendToastText"></p>
        </div>
        <button type="button" id="legendToastClose"></button>
      </aside>
      <aside class="win-panel" id="winPanel" role="status" aria-live="polite">
        <span class="firework" aria-hidden="true"></span>
        <span class="firework" aria-hidden="true"></span>
        <span class="firework" aria-hidden="true"></span>
        <span class="firework" aria-hidden="true"></span>
        <div class="win-card">
          <button class="win-close" type="button" id="closeWinButton"></button>
          <h2 id="winTitle"></h2>
          <p id="winMessage"></p>
          <div class="win-actions">
            <a class="game-button reward" id="previewRewardButton" target="_blank" rel="noopener noreferrer" hidden></a>
            <button class="game-button" type="button" id="playAgainButton"></button>
            <button class="game-button secondary" type="button" id="winShareButton"></button>
            <a class="game-button" id="getCopyButton" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
      </aside>
      <footer class="game-footer standalone-only">
        Building bridges across cultures. Copyrights
        <a href="https://federiconavarrete.com" target="_blank" rel="noopener noreferrer">Federico Navarrete</a>.
      </footer>
    </main>

    <script src="js/memory-game.min.js?v=20260523-flip-delay"></script>
    <script src="js/pwa.min.js" defer></script>
  </body>
</html>
